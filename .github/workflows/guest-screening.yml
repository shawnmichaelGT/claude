name: Gmail Guest Screening

on:
  schedule:
    # Runs once a day
    - cron: "0 18,0 * * *"
  workflow_dispatch:
    # Allows manual runs from the GitHub Actions tab

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gmail_guest_screening/requirements.txt

      - name: Install dependencies
        run: pip install -r gmail_guest_screening/requirements.txt

      - name: Run guest screening
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDS_JSON: ${{ secrets.GMAIL_CREDS_JSON }}
        run: python gmail_guest_screening/screen_guests.py
